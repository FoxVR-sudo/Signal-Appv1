name: Deploy Backend to Render

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'render.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | jq .
