name: Android Native Build

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to build"
        required: true
        default: "citizen"
        type: choice
        options:
          - citizen
          - patrol
      variant:
        description: "Android build variant"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build selected app
        shell: bash
        run: |
          if [ "${{ inputs.app }}" = "citizen" ]; then
            APP_DIR="apps/citizen-mobile/android"
            APK_NAME="signal-citizen"
          else
            APP_DIR="apps/patrol-mobile/android"
            APK_NAME="signal-patrol"
          fi

          cd "$APP_DIR"

          if [ "${{ inputs.variant }}" = "release" ]; then
            ./gradlew assembleRelease
            APK_PATH="app/build/outputs/apk/release/app-release.apk"
            OUT_NAME="${APK_NAME}-release.apk"
          else
            ./gradlew assembleDebug
            APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
            OUT_NAME="${APK_NAME}-debug.apk"
          fi

          cp "$APK_PATH" "/tmp/$OUT_NAME"
          echo "APK_FILE=/tmp/$OUT_NAME" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app }}-${{ inputs.variant }}-apk
          path: ${{ env.APK_FILE }}