name: EAS Android Build

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to build"
        required: true
        default: "citizen"
        type: choice
        options:
          - citizen
          - patrol
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build selected app
        shell: bash
        run: |
          if [ "${{ inputs.app }}" = "citizen" ]; then
            APP_DIR="apps/citizen-mobile"
          else
            APP_DIR="apps/patrol-mobile"
          fi

          cd "$APP_DIR"
          eas build --platform android --profile "${{ inputs.profile }}" --non-interactive --no-wait
